# codemagic.yaml — A LA RACINE du depot (a cote de package.json)
#
# Avant de lancer le PROD :
#   - dans Codemagic > Environment variables, ajoute CERTIFICATE_PRIVATE_KEY
#     (ta cle RSA) dans un groupe nomme "ios_signing", coche Secure.
#
# A personnaliser dans le workflow PROD (cherche "<-- A MODIFIER") :
#   - le NOM de ta cle API (le meme que dans Codemagic > Integrations)
#   - ton EMAIL

workflows:

  # =========================================================================
  # 1) TEST — sans signature, sans compte Apple
  # =========================================================================
  ios-test-build:
    name: EVOSWARM iOS - TEST (sans compte Apple)
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Installer les dependances npm
        script: npm install
      - name: Generer le projet iOS (Capacitor)
        script: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
          npx cap sync ios
      - name: Compiler pour le simulateur (SANS signature)
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - /tmp/xcodebuild_logs/*.log

  # =========================================================================
  # 2) BUILD REEL — signe + envoi App Store / TestFlight
  # =========================================================================
  ios-evoswarm:
    name: EVOSWARM iOS - PROD
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: EvoSwarm_key
    environment:
      groups:
        - ios_signing                        # contient CERTIFICATE_PRIVATE_KEY (ajoute dans Codemagic)
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.evoswarm.game"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Installer les dependances npm
        script: npm install
      - name: Generer/synchroniser le projet iOS (Capacitor)
        script: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
          npx cap sync ios
      - name: Initialiser le trousseau (keychain)
        script: keychain initialize
      - name: Recuperer / CREER le certificat + le profil de signature
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Ajouter le certificat au trousseau
        script: keychain add-certificates
      - name: Appliquer les profils au projet Xcode
        script: xcode-project use-profiles
      - name: Definir le numero de build
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Compiler l'IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - blas.raymond@outlook.fr
      app_store_connect:
        auth: integration
        submit_to_testflight: true
