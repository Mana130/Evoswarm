# codemagic.yaml — A LA RACINE du depot (a cote de package.json)
#
# Il y a 2 workflows :
#   1) ios-test-build  -> A LANCER MAINTENANT (aucun compte Apple requis). Verifie que le projet compile.
#   2) ios-evoswarm    -> A LANCER QUAND ton compte Apple est valide + cle API ajoutee. Build signe + TestFlight.
#
# Pour le workflow 1, RIEN a modifier : lance-le tel quel.
# Pour le workflow 2, modifie les lignes "<-- A MODIFIER".

workflows:

  # =========================================================================
  # 1) TEST IMMEDIAT — sans signature, sans compte Apple
  # =========================================================================
  ios-test-build:
    name: EVOSWARM iOS - TEST (sans compte Apple)
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Installer les dependances npm
        script: npm install
      - name: Generer le projet iOS (Capacitor)
        script: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
          npx cap sync ios
      - name: Compiler pour le simulateur (SANS signature)
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - /tmp/xcodebuild_logs/*.log

  # =========================================================================
  # 2) BUILD REEL — signe + envoi App Store / TestFlight
  # =========================================================================
  ios-evoswarm:
    name: EVOSWARM iOS - PROD
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: CODEMAGIC_API_KEY   # <-- A MODIFIER : nom exact de ta cle dans Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.evoswarm.game   # <-- A MODIFIER (ex: com.mana130.evoswarm) = appId de capacitor.config.json
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.evoswarm.game"          # <-- A MODIFIER (meme valeur que ci-dessus)
        # APP_STORE_APPLE_ID: 0000000000        # (optionnel) ID numerique de l'app
      node: 20
      xcode: latest                      # Xcode 26+ exige par Apple depuis avril 2026 ("latest" prend le bon)
      cocoapods: default
    scripts:
      - name: Installer les dependances npm
        script: npm install
      - name: Generer/synchroniser le projet iOS (Capacitor)
        script: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
          npx cap sync ios
      - name: Appliquer la signature aux profils Xcode
        script: xcode-project use-profiles
      - name: Definir le numero de build
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Compiler l'IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - ton-email@exemple.com         # <-- A MODIFIER
      # --- A DECOMMENTER quand l'app existe dans App Store Connect (envoi auto TestFlight) ---
      # app_store_connect:
      #   auth: integration
      #   submit_to_testflight: true
